workflows:
  ios-workflow:
    name: Koliber Lux iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: 3.27.0
      xcode: latest
    scripts:
      - name: Hard Clean and Setup
        script: |
          echo "Czyszczenie i przygotowanie środowiska..."
          flutter clean
          
          # Kluczowe: usuwamy stare repozytorium master, które blokuje build
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          pod repo remove master || true
          
          flutter pub get
          flutter precache --ios

      - name: CocoaPods Installation (Fast CDN Mode)
        script: |
          cd ios
          # Wymuszamy użycie CDN zamiast powolnego pobierania z GitHub
          export CP_HOMEBREW_CLEANUP=1
          
          # Instalacja bez 'pod repo update', co oszczędza 15 minut buildu
          pod install --repo-update

      - name: Flutter Build iOS
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - kontakt@koliberlux.pl
        notify:
          success: true
          failure: true