workflows:
  ios-workflow:
    name: iOS Build Workflow
    environment:
      flutter: 3.24.5  # Stabilna wersja wspierająca Twoje biblioteki
      xcode: latest
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install --repo-update
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign -t lib/main.dart
    artifacts:
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - kontakt@koliberlux.pl