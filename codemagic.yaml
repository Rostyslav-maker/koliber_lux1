workflows:
  ios-workflow:
    name: Koliber Lux iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: 3.27.0
      xcode: latest
      groups:
        - google_play_credentials # Jeśli używasz, jeśli nie - usuń tę linię
    scripts:
      - name: Hard Clean and Environment Setup
        script: |
          echo "Rozpoczynam głębokie czyszczenie projektu..."
          flutter clean
          
          # Usuwanie wszystkich artefaktów iOS, które mogą powodować błędy ścieżek
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ios/.symlinks
          rm -rf ~/Library/Developer/Xcode/DerivedData
          
          # Pobieranie paczek Fluttera
          flutter pub get
          
          # WYMUSZENIE pobrania plików binarnych i podspec dla iOS
          # To rozwiązuje problem "No podspec found"
          flutter precache --ios

      - name: CocoaPods Installation
        script: |
          cd ios
          
          # Aktualizacja repozytorium CocoaPods (trwa chwilę, ale jest niezbędna)
          pod repo update
          
          # Instalacja z wymuszeniem czystego startu
          # Jeśli masz błąd 'google_sign_in_ios', ta komenda spróbuje go naprawić
          pod install --repo-update

      - name: Flutter Build iOS
        script: |
          # Budowanie wersji release bez podpisywania kodu (do testów/eksportu .app)
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - kontakt@koliberlux.pl
        notify:
          success: true
          failure: true