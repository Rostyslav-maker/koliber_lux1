workflows:
  ios-workflow:
    name: iOS Build Workflow
    environment:
      flutter: 3.27.0
      xcode: latest
    scripts:
      - name: Hard Reset and Pub Get
        script: |
          echo "Czyszczenie projektu i cache..."
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ios/.symlinks
          # Usuwamy specyficzny cache pub, aby wymusić pobranie nowej wersji z overrides
          rm -rf ~/.pub-cache/hosted/pub.dev/google_sign_in_ios*
          
          flutter pub get

      - name: Pre-build fix for Google Sign In
        script: |
          # Wymuszamy generowanie plików konfiguracyjnych iOS
          flutter precache --ios
          cd ios
          # Czyścimy cache CocoaPods dla tej konkretnej wtyczki
          pod cache clean google_sign_in_ios --all

      - name: Pod install
        script: |
          cd ios
          # Instalacja z wymuszeniem aktualizacji repozytoriów
          pod install --repo-update

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign -t lib/main.dart

    artifacts:
      - build/ios/iphoneos/*.app
    
    publishing:
      email:
        recipients:
          - kontakt@koliberlux.pl