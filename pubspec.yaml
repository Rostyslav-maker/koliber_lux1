name: koliber_lux
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Zarządzanie stanem i UI
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  
  # Funkcje lojalnościowe i narzędzia
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.1
  
  # Efekty wizualne i animacje
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  confetti: ^0.8.0
  heroicons: ^0.11.0
  
  # Nawigacja i komunikacja
  go_router: ^14.0.0
  http: ^1.6.0

  # Autentykacja i Firebase
  google_sign_in: 7.2.0
  sign_in_with_apple: ^7.0.1
  flutter_facebook_auth: ^7.1.5
  mobile_scanner: ^6.0.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Zmieniono z ^6.0.0 na ^5.0.0, aby pasowało do wersji SDK Dart w Codemagic
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Jeśli masz pliki graficzne, odkomentuj poniższe linie:
  # assets:
  #   - assets/images/