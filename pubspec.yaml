name: koliber_lux
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Zarządzanie stanem i UI
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  
  # Funkcje lojalnościowe i narzędzia
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.1
  
  # Efekty wizualne i animacje
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  confetti: ^0.8.0
  heroicons: ^0.11.0
  
  # Nawigacja i komunikacja
  go_router: ^14.0.0
  http: ^1.6.0

  # Autentykacja i Firebase (Wersje stabilne dla Dart 3.6.0)
  google_sign_in: 6.2.1
  sign_in_with_apple: ^6.1.1
  flutter_facebook_auth: ^7.0.1
  mobile_scanner: ^6.0.0
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Wersja 5.0.0 nie blokuje buildu na Dart 3.6.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Jeśli masz pliki w assets, upewnij się, że ten folder istnieje:
  # assets:
  #   - assets/images/